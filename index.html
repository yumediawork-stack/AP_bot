<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <title>AutoPost</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <!-- Telegram-only gate -->
  <div id="tg-gate" class="gate hidden">
    <div class="gate-card">
      <div class="gate-logo">AutoPost</div>
      <svg class="gate-icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.5 4.5 2.5 12.5l6 2 2 6 3-4 5 4 3-16z"/>
      </svg>
      <h1>Open in Telegram</h1>
      <p>This app must be launched from inside Telegram. Please open it via the official Telegram Mini-App button.</p>
    </div>
  </div>

  <!-- App shell -->
  <div id="app" class="app hidden">
    <!-- Top bar -->
    <header class="topbar">
      <button id="btn-back" class="icon-btn hidden" aria-label="Back">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
      </button>
      <div class="brand">Auto<span>Post</span></div>
      <button id="btn-home" class="icon-btn" aria-label="Home">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </button>
    </header>

    <!-- Status / user strip -->
    <div id="user-strip" class="user-strip"></div>

    <!-- Routed views -->
    <main id="view" class="view"></main>

    <!-- Loading overlay -->
    <div id="loader" class="loader hidden"><div class="spinner"></div></div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
